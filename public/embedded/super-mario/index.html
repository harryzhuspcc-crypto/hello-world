<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plumber Quest</title>
    <script type="module" crossorigin src="assets/index-ByujLYCD.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-BywQmexI.css">
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Mario style platformer"></canvas>
      <div class="hud">
        <div class="pill"><span>Coins</span><strong id="coins">0</strong></div>
        <div class="pill"><span>Lives</span><strong id="lives">3</strong></div>
        <div class="pill"><span>Power</span><strong id="power">Small</strong></div>
        <div class="pill"><span>Time</span><strong id="time">300</strong></div>
      </div>
      <section id="overlay" class="overlay overlay--visible">
        <div class="card">
          <div class="eyebrow">Original platformer homage</div>
          <h1>Plumber Quest</h1>
          <p>
            Run, jump, stomp little troublemakers, collect coins, grab a mushroom, and reach the flag at the end of the course.
          </p>
          <div class="controls">
            <div><span>Move</span><strong>A / D or ← / →</strong></div>
            <div><span>Jump</span><strong>W / ↑ / Space</strong></div>
            <div><span>Restart</span><strong>R</strong></div>
            <div><span>Pause</span><strong>P</strong></div>
          </div>
          <button id="start">Start Game</button>
        </div>
      </section>
    </div>
  </body>
</html>
